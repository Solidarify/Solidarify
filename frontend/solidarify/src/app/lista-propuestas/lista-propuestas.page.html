<ion-content [fullscreen]="true">
  
  <div class="stats-card">
    <div class="stats-content">
      <div class="stat-text">
        <h2>{{totalPropuestas}}</h2>
        <p>Disponibles ahora</p>
      </div>
      <ion-button fill="outline" shape="round" color="primary" (click)="limpiarFiltros()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="filtros-card">
    <ion-item lines="none">
      <ion-icon name="search-outline" slot="start" color="medium"></ion-icon>
      <ion-input 
        [formControl]="searchControl" 
        placeholder="¿Qué buscas hoy?">
      </ion-input>
    </ion-item>
  </div>

  <div class="list-header" *ngIf="!loading">
    <ion-label>Resultados <span>({{totalPropuestas}})</span></ion-label>
  </div>
  <ion-list lines="none" *ngIf="!loading">
    <ion-item *ngFor="let propuesta of (propuestas$ | async); trackBy: trackById" 
              button 
              detail="false"
              class="propuesta-item"
              (click)="verDetalle(propuesta)">
      
      <div class="tipo-avatar" slot="start">
        <ion-icon name="gift-outline"></ion-icon>
      </div>

      <ion-label class="propuesta-label">
        <h2>{{propuesta.titulo}}</h2>
        
        <div class="info-row">
          <ion-icon name="location-outline"></ion-icon>
          <span>{{propuesta.lugar}}</span>
        </div>

        <div class="fechas">
          {{propuesta.fechaInicio | date:'d MMM'}} - {{propuesta.fechaFin | date:'d MMM'}}
        </div>
      </ion-label>

      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>
  </ion-list>

  <div class="loading-center" *ngIf="loading">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Buscando propuestas...</p>
  </div>

</ion-content>
