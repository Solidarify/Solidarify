<ion-header>
  <ion-toolbar color="primary">
    
    <ion-buttons slot="start">
      <ion-menu-button color="light" auto-hide="false"></ion-menu-button>
    </ion-buttons>
    
    <ion-title class="logo-title" (click)="goToHome()">
      Solidarify
    </ion-title>
    
    <ion-buttons slot="end" *ngIf="!isLoggedIn">
      <ion-button fill="clear" color="light" routerLink="/login">
        <ion-icon name="log-in-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="light" routerLink="/register">
        <ion-icon name="person-add-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    
    <ion-buttons slot="end" *ngIf="isLoggedIn">
      <ion-button fill="clear" color="light" routerLink="/account">
        <div class="header-avatar" *ngIf="currentUser?.nombre">
          {{ currentUser.nombre.charAt(0) | uppercase }}
        </div>
        <ion-icon *ngIf="!currentUser?.nombre" name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
      
      <ion-button fill="clear" color="light" (click)="onLogout.emit()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    
  </ion-toolbar>
</ion-header>
