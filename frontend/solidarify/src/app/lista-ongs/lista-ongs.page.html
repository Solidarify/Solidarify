<ion-content [fullscreen]="true">

  <div class="stats-card">
    <div class="stats-content">
      <div class="stat-text">
        <h2>{{ totalOngs }}</h2>
        <p>{{ pageTitle }} disponibles</p>
      </div>

      <ion-button 
        *ngIf="userRole !== 'Usuario'" 
        fill="outline" 
        shape="round" 
        color="primary" 
        (click)="limpiarFiltros()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="filtros-card">
    <ion-item lines="none">
      <ion-icon name="search-outline" slot="start" color="medium"></ion-icon>
      <ion-input 
        [formControl]="searchControl" 
        placeholder="Buscar ONGs por nombre, CIF...">
      </ion-input>
    </ion-item>
  </div>

  <div class="list-header" *ngIf="!loading">
    <ion-label>{{ pageTitle }} <span>({{ totalOngs }})</span></ion-label>
  </div>

  <ion-list lines="none" *ngIf="!loading">
    <ion-item *ngFor="let ong of (ongs$ | async); trackBy: trackById"
              button
              detail="false"
              class="ong-item"
              (click)="verDetalle(ong)">

      <div class="tipo-avatar" slot="start">
        <ion-icon name="people-circle-outline"></ion-icon>
      </div>

      <ion-label class="ong-label">
        <h2>{{ ong.displayName }}</h2>

        <div class="info-row">
          <ion-icon name="document-text-outline"></ion-icon>
          <span>{{ ong.cif }}</span>
        </div>

        <div class="info-row" *ngIf="ong.direccion">
          <ion-icon name="location-outline"></ion-icon>
          <span>{{ ong.direccion }}</span>
        </div>

        <div class="estado-chip" [ngClass]="ong.estadoVerificacion">
          {{ ong.estadoVerificacion | titlecase }}
        </div>
      </ion-label>

      <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
    </ion-item>
  </ion-list>

  <div class="loading-center" *ngIf="loading">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando ONGs...</p>
  </div>

</ion-content>
