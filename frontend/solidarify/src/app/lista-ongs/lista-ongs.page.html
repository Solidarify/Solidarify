<ion-content [fullscreen]="true" class="bg-light">
  
  <div class="stats-card fade-in-down">
    <div class="stats-content">
      <div class="stat-text">
        <div class="stat-number">
          {{ totalOngs }}
        </div>
        <p class="stat-label">
          ONGs Aliadas
        </p>
      </div>
      
      <ion-button 
        *ngIf="searchControl.value" 
        fill="clear" 
        class="refresh-btn" 
        (click)="limpiarFiltros()">
        <ion-icon name="close-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>
    <div class="deco-circle"></div>
  </div>

  <div class="filtros-container fade-in-up">
    <div class="search-bar">
      <ion-icon name="search-outline" class="search-icon"></ion-icon>
      <input 
        type="text" 
        [formControl]="searchControl" 
        placeholder="Buscar fundación..." 
        class="native-input"
      />
    </div>
  </div>

  <div class="list-header" *ngIf="!loading">
    <h3>Directorio <span>Solidario</span></h3>
  </div>

  <ng-container *ngIf="ongs$ | async as ongsList">
    
    <div class="ongs-list" *ngIf="!loading">
      
      <div *ngFor="let ong of ongsList; trackBy: trackById" 
           class="ong-card scale-in"
           (click)="verDetalle(ong)">
        
        <div class="status-stripe" [ngClass]="{
          'verificado': ong.isVerified,
          'pendiente': !ong.isVerified
        }"></div>

        <div class="card-icon-box">
          <div class="avatar-circle">
             <span class="initials">{{ (ong.displayName || ong.nombreLegal).substring(0,2) | uppercase }}</span>
          </div>
          <div class="verified-badge" *ngIf="ong.isVerified">
            <ion-icon name="checkmark-circle"></ion-icon>
          </div>
        </div>

        <div class="card-info">
          <h2 class="card-title">{{ ong.displayName || ong.nombreLegal }}</h2>
          
          <div class="card-desc" *ngIf="ong.descripcion">
            {{ ong.descripcion }}
          </div>

          <div class="card-meta" *ngIf="ong.web">
            <ion-icon name="globe-outline"></ion-icon>
            <span class="web-link">Sitio Web</span>
          </div>
        </div>

        <div class="card-action">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>
      </div>

      <div *ngIf="ongsList.length === 0" class="empty-state">
        <div class="empty-icon">
          <ion-icon name="business-outline"></ion-icon>
        </div>
        <p>No encontramos esa ONG.</p>
        <ion-button fill="clear" color="primary" (click)="limpiarFiltros()">Ver todas</ion-button>
      </div>

    </div>

  </ng-container>

  <div class="loading-container" *ngIf="loading">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Conectando con ONGs...</p>
  </div>

</ion-content>
